name: Super Sync

on:
  schedule:
    - cron: "0 8,20 * * *"
  workflow_dispatch:
    inputs:
      ref:
        description: "Git tag or commit ref from super-productivity repo (leave blank for latest release)"
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  UPSTREAM_REPO: super-productivity/super-productivity

jobs:
  check-update:
    # Skipped when manually triggered with a specific ref — the caller already knows what to build.
    if: github.event_name != 'workflow_dispatch' || inputs.ref == ''
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.upstream.outputs.RELEASE_TAG }}
      has_update: ${{ steps.check-tag.outputs.has_update }}

    steps:
      - name: Set Lowercase Image Name
        run: |
          echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}/super-sync" >> $GITHUB_ENV

      - name: Get Latest Upstream Release
        id: upstream
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG=$(gh release view --repo "${{ env.UPSTREAM_REPO }}" --json tagName --jq .tagName)
          echo "RELEASE_TAG=$TAG" >> $GITHUB_OUTPUT
          echo "Detected Tag: $TAG"

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if image already exists
        id: check-tag
        run: |
          FULL_IMAGE_NAME="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          TAG="${{ steps.upstream.outputs.RELEASE_TAG }}"

          if docker manifest inspect $FULL_IMAGE_NAME:$TAG > /dev/null 2>&1; then
            echo "has_update=false" >> $GITHUB_OUTPUT
            echo "Tag $TAG already exists in registry. Skipping build."
          else
            echo "has_update=true" >> $GITHUB_OUTPUT
            echo "Tag $TAG not found. Proceeding with build."
          fi

  build-and-push:
    needs: [check-update]
    # Runs when a specific ref was given manually (check-update was skipped),
    # or when check-update found a new upstream tag.
    if: always() && (inputs.ref != '' || needs.check-update.outputs.has_update == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Set Lowercase Image Name
        run: |
          echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}/super-sync" >> $GITHUB_ENV

      - name: Resolve release tag
        id: upstream
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ inputs.ref }}" ]; then
            TAG="${{ inputs.ref }}"
          else
            TAG="${{ needs.check-update.outputs.release_tag }}"
          fi
          echo "RELEASE_TAG=$TAG" >> $GITHUB_OUTPUT
          echo "Building tag: $TAG"

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout super-productivity at ref
        uses: actions/checkout@v7
        with:
          repository: ${{ env.UPSTREAM_REPO }}
          ref: ${{ steps.upstream.outputs.RELEASE_TAG }}

      - name: Enable migrations on startup
        run: |
          sed -i 's/ENV RUN_MIGRATIONS_ON_STARTUP=false/ENV RUN_MIGRATIONS_ON_STARTUP=true/' \
            packages/super-sync-server/Dockerfile

      - name: Compute image tags
        id: tags
        run: |
          REF="${{ steps.upstream.outputs.RELEASE_TAG }}"
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          # If ref looks like a version tag (starts with v followed by a digit), also tag latest
          if echo "$REF" | grep -qE '^v[0-9]'; then
            echo "tags=${IMAGE}:${REF},${IMAGE}:latest" >> "$GITHUB_OUTPUT"
          else
            echo "tags=${IMAGE}:${REF}" >> "$GITHUB_OUTPUT"
          fi

      - uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./packages/super-sync-server/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.title=Super Sync Server
            org.opencontainers.image.description=Super Sync Server from super-productivity
            org.opencontainers.image.vendor=${{ github.repository_owner }}
            org.opencontainers.image.source=https://github.com/${{ env.UPSTREAM_REPO }}
            org.opencontainers.image.revision=${{ steps.upstream.outputs.RELEASE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Output image details
        run: |
          echo "Image pushed to: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}"
          echo "Tags: ${{ steps.tags.outputs.tags }}"
          echo "Digest: ${{ steps.push.outputs.digest }}"
